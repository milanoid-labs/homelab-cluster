---
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: homelab-runners
    container: pipelinecomponents/yamllint:latest@sha256:5ab5eb7da0ed5e606b07c1723fc8b275e925189f70ac259b26b7329cb5f8f44d
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Run yamllint
        run: yamllint -c .yamllint.yaml .

  kubeconform:
    name: Kubeconform
    runs-on: homelab-runners
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install kustomize and kubeconform
        run: |
          KUSTOMIZE_VERSION="5.6.0"
          KUBECONFORM_VERSION="0.6.7"
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | tar xz
          sudo mv kustomize /usr/local/bin/
          curl -sL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate kustomize overlays
        run: |
          set -euo pipefail
          build_file="$(mktemp /tmp/build-XXXXXX.yaml)"
          trap 'rm -f "$build_file"' EXIT
          for overlay in \
            apps/staging \
            infrastructure/controllers/staging \
            infrastructure/k3s-upgrade-plans \
            monitoring/controllers/staging \
            monitoring/configs/staging \
            persistent-volumes/staging \
            workflows/staging; do
            echo "--- Validating $overlay ---"
            # kubeconform mis-splits very large multi-doc YAML (e.g. Argo Workflows CRDs)
            # when reading from stdin, so build to a temp file and pass that instead.
            kustomize build --load-restrictor LoadRestrictionsNone "$overlay" > "$build_file"
            kubeconform \
              --ignore-missing-schemas \
              --kubernetes-version 1.34.0 \
              --summary \
              "$build_file"
          done

  kube-linter:
    name: Kube Linter
    runs-on: homelab-runners
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Run kube-linter
        uses: stackrox/kube-linter-action@87802a2f4e01abebb3ee3c67a3002fea71f6eae5 # v1
        with:
          directory: .
          config: .kube-linter.yaml
