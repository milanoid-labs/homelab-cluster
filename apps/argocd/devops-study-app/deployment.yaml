---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-study-app
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: devops-study-app
  template:
    metadata:
      labels:
        app: devops-study-app
    spec:
      containers:
        - image: ghcr.io/milanoid-labs/study-app-api:backend-v0.2.4@sha256:67acd4a6248260df5e1a21258546320c338dc30566d0d7b1979fc92dcd9a51ec
          name: devops-study-app-backend
          ports:
            - containerPort: 22112
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
