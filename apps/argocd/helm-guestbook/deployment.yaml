---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helm-guestbook-ui
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: helm-guestbook-ui
  template:
    metadata:
      labels:
        app: helm-guestbook-ui
    spec:
      containers:
        - image: gcr.io/google-samples/gb-frontend:v5@sha256:a908df8486ff66f2c4daa0d3d8a2fa09846a1fc8efd65649c0109695c7c5cbff
          name: helm-guestbook-ui
          ports:
            - containerPort: 80
