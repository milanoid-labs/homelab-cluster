---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      containers:
        - name: prowlarr
          image: ghcr.io/hotio/prowlarr:release-2.4.0.5397@sha256:c9319f40924d43083e146b88a2863d850432400b613d6c101be8afa2777cc01f
          envFrom:
            - configMapRef:
                name: prowlarr-configmap
          ports:
            - containerPort: 9696
              protocol: TCP
          volumeMounts:
            - mountPath: /config
              name: prowlarr-config
              subPath: prowlarr/config

      restartPolicy: Always
      volumes:
        - name: prowlarr-config
          persistentVolumeClaim:
            claimName: prowlarr-config-pvc
