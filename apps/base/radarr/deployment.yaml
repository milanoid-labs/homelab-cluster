---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: ghcr.io/hotio/radarr:release-6.2.1.10461@sha256:d367a6dc9272b1b20034193617b0b4116bac5b1c0005b565f8ced403b8692cf9
          envFrom:
            - configMapRef:
                name: radarr-configmap
          ports:
            - containerPort: 7878
              protocol: TCP
          volumeMounts:
            - mountPath: /config
              name: radarr-config
              subPath: radarr/config
            - mountPath: /data
              name: radarr-data

      restartPolicy: Always
      volumes:
        - name: radarr-data
          persistentVolumeClaim:
            claimName: synology-nfs-pvc
        - name: radarr-config
          persistentVolumeClaim:
            claimName: radarr-config-pvc
