---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homarr
  template:
    metadata:
      labels:
        app: homarr
    spec:
      nodeSelector:
        kubernetes.io/hostname: hpmini02  # pinned: local-path PV lives on this node
      containers:
        - name: homarr
          image: ghcr.io/homarr-labs/homarr:v1.70.0@sha256:80ee593cd76afbbb34b8edb4b345281e2bf47d33e6d682684d6ad36624784ce0
          ports:
            - containerPort: 7575
          envFrom:
            - secretRef:
                name: homarr-secrets
          volumeMounts:
            - mountPath: /appdata
              name: homarr-data
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 0  # image ships root-owned /appdata and runs as root
      volumes:
        - name: homarr-data
          persistentVolumeClaim:
            claimName: homarr-data-pvc
