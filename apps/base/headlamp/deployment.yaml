---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headlamp
  template:
    metadata:
      labels:
        app: headlamp
    spec:
      serviceAccountName: headlamp
      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:v0.43.0@sha256:3b5482c0af7edf93c8b4cd21af450506c74d1098f642eeaf287ebba43689d729
          args: ["--in-cluster", "--port=4466"]
          env:
            - name: HEADLAMP_BACKEND_TOKEN
              valueFrom:
                secretKeyRef:
                  name: headlamp-token
                  key: token
          ports:
            - containerPort: 4466
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 100
