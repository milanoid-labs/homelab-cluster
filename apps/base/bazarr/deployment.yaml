---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bazarr
  template:
    metadata:
      labels:
        app: bazarr
    spec:
      containers:
        - name: bazarr
          image: ghcr.io/hotio/bazarr:release-1.6.0@sha256:7be5ab7e79e34d206c1554667b9eba8d1c0cdeb605f918e468309300536a4c2f
          envFrom:
            - configMapRef:
                name: bazarr-configmap
          ports:
            - containerPort: 6767
              protocol: TCP
          volumeMounts:
            - mountPath: /config
              name: bazarr-config
              subPath: bazarr/config
            - mountPath: /data
              name: bazarr-data

      restartPolicy: Always
      volumes:
        - name: bazarr-config
          persistentVolumeClaim:
            claimName: bazarr-config-pvc
        - name: bazarr-data
          persistentVolumeClaim:
            claimName: synology-nfs-pvc
