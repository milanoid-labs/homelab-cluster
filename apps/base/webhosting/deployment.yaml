---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhosting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhosting
  template:
    metadata:
      labels:
        app: webhosting
    spec:
      containers:
        - name: nginx
          image: nginx:1.31.3@sha256:5a88c9c45479443d7be2eadc894b4ed0a9801bae03d97a5760ae13b5c2005942
          ports:
            - containerPort: 80
          volumeMounts:
            - mountPath: /usr/share/nginx/html
              name: webhosting-data
      volumes:
        - name: webhosting-data
          persistentVolumeClaim:
            claimName: webhosting-data-pvc
