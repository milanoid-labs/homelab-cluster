---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhosting
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webhosting
  template:
    metadata:
      labels:
        app: webhosting
    spec:
      containers:
        - name: nginx
          image: nginx:1.31.0@sha256:06aa3d7be10bc6307990c81bdca075793132e9163391abc370c015e344e23128
          ports:
            - containerPort: 80
          volumeMounts:
            - mountPath: /usr/share/nginx/html
              name: webhosting-data
      volumes:
        - name: webhosting-data
          persistentVolumeClaim:
            claimName: webhosting-data-pvc
