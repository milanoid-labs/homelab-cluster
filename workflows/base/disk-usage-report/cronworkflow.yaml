---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: media-disk-usage-report
spec:
  schedules:
    - "0 6 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    entrypoint: report
    serviceAccountName: disk-usage-report
    ttlStrategy:
      secondsAfterCompletion: 3600
    templates:
      - name: report
        container:
          image: busybox:1.38.0@sha256:1cfa4e2b09e127b9c4ed43578d3f3c18e7d44ea47b9ea98475c0cbe9086525f8
          command: ["sh", "-c"]
          args:
            - |
              echo "=== Disk usage per top-level folder ==="
              du -sh /media/*/ 2>/dev/null | sort -rh
              echo
              echo "=== Overall volume usage ==="
              df -h /media
          volumeMounts:
            - name: media
              mountPath: /media
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
    volumes:
      - name: media
        persistentVolumeClaim:
          claimName: synology-nfs-pvc
          readOnly: true
