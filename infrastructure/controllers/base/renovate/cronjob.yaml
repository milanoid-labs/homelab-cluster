---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          initContainers:
            - name: mint-token
              image: alpine:3.24@sha256:a2d49ea686c2adfe3c992e47dc3b5e7fa6e6b5055609400dc2acaeb241c829f4
              command: ["/bin/sh", "/scripts/mint-token.sh"]
              env:
                - name: GITHUB_APP_ID
                  valueFrom:
                    configMapKeyRef:
                      name: renovate-configmap
                      key: GITHUB_APP_ID
                - name: GITHUB_INSTALLATION_ID
                  valueFrom:
                    configMapKeyRef:
                      name: renovate-configmap
                      key: GITHUB_INSTALLATION_ID
                - name: GITHUB_APP_KEY
                  valueFrom:
                    secretKeyRef:
                      name: renovate-container-env
                      key: GITHUB_APP_KEY
              volumeMounts:
                - name: shared
                  mountPath: /shared
                - name: mint-script
                  mountPath: /scripts
              securityContext:
                allowPrivilegeEscalation: false

          containers:
            - name: renovate
              image: renovate/renovate:43.214.6@sha256:0e3778f0de0a627e87f1764d961455583efba7c63fc4b8ec15d073a23f582e62
              command: ["/bin/sh", "-c"]
              args:
                - export RENOVATE_TOKEN=$(cat /shared/token) && renovate milanoid-labs/homelab-cluster

              envFrom:
                - configMapRef:
                    name: renovate-configmap
              volumeMounts:
                - name: shared
                  mountPath: /shared
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi

          volumes:
            - name: shared
              emptyDir: {}
            - name: mint-script
              configMap:
                name: renovate-mint-token-script
                defaultMode: 0755

          restartPolicy: Never
