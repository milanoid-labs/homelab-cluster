---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          initContainers:
            - name: mint-token
              image: alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
              command: ["/bin/sh", "/scripts/mint-token.sh"]
              env:
                - name: GITHUB_APP_ID
                  valueFrom:
                    configMapKeyRef:
                      name: renovate-configmap
                      key: GITHUB_APP_ID
                - name: GITHUB_INSTALLATION_ID
                  valueFrom:
                    configMapKeyRef:
                      name: renovate-configmap
                      key: GITHUB_INSTALLATION_ID
                - name: GITHUB_APP_KEY
                  valueFrom:
                    secretKeyRef:
                      name: renovate-container-env
                      key: GITHUB_APP_KEY
              volumeMounts:
                - name: shared
                  mountPath: /shared
                - name: mint-script
                  mountPath: /scripts
              securityContext:
                allowPrivilegeEscalation: false

          containers:
            - name: renovate
              image: renovate/renovate:43.217.1@sha256:1d2ef5146c66adbf3221f0e5b361665ae636f4261349d3119fd6c3d3331b5a50
              command: ["/bin/sh", "-c"]
              args:
                - export RENOVATE_TOKEN=$(cat /shared/token) && renovate milanoid-labs/homelab-cluster

              envFrom:
                - configMapRef:
                    name: renovate-configmap
              volumeMounts:
                - name: shared
                  mountPath: /shared
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi

          volumes:
            - name: shared
              emptyDir: {}
            - name: mint-script
              configMap:
                name: renovate-mint-token-script
                defaultMode: 0755

          restartPolicy: Never
